<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    margin:0;
    font-family: Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input {
    width:100%;
    padding:10px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button {
    width:100%;
    padding:10px;
    background:#222;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>AI Recommendation</h2>

    <form method="post">
        <input type="number" name="user_id" placeholder="Enter User ID" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
